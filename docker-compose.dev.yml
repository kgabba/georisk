services:
  web-dev:
    image: node:20-alpine
    working_dir: /app
    env_file:
      - .env
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0 -p 3000"
    volumes:
      - ./:/app
      - web_dev_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - webnet

volumes:
  web_dev_node_modules:
