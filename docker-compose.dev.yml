services:
  web-dev:
    image: node:20-alpine
    working_dir: /app
    env_file:
      - .env
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0 -p 3000"
    volumes:
      - ./:/app
      - web_dev_node_modules:/app/node_modules
      # Отдельный том для .next: иначе кэш на хосте (после next build) ломает next dev в контейнере (Cannot find module './NNN.js').
      - web_dev_next:/app/.next
    # 0.0.0.0 — иначе с другой машины / без SSH-туннеля «localhost» не дотянется до контейнера.
    ports:
      - "3002:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - webnet

  api:
    environment:
      REPORT_DISABLE_CACHE: "true"

volumes:
  web_dev_node_modules:
  web_dev_next:
