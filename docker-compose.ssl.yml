# Включает HTTPS только ПОСЛЕ успешного certbot (файлы в томе certbot_conf).
# Без сертификатов nginx не поднимется — не подключайте этот файл раньше времени.
# Запуск: docker compose -f docker-compose.yml -f docker-compose.ssl.yml up -d

services:
  nginx:
    ports:
      - "443:443"
    volumes:
      - ./infra/nginx/https.conf:/etc/nginx/conf.d/https.conf:ro
