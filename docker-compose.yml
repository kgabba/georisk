services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - webnet

  pgadmin:
    image: dpage/pgadmin4:8.14
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@georisk.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change_me_pgadmin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - webnet

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 3001
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # If NSPD HTTPS fails with self-signed chain (TLS inspection), set NSPD_TLS_INSECURE=true in .env
      NSPD_TLS_INSECURE: ${NSPD_TLS_INSECURE:-}
      # Prefer: mount CA bundle and set NODE_EXTRA_CA_CERTS=/path/in/container (see .env.example)
      NODE_EXTRA_CA_CERTS: ${NODE_EXTRA_CA_CERTS:-}
      # Optional: HTTP proxy for NSPD only (second VPS / residential), e.g. http://user:pass@host:3128
      NSPD_HTTPS_PROXY: ${NSPD_HTTPS_PROXY:-}
      NSPD_HTTP_PROXY: ${NSPD_HTTP_PROXY:-}
      GEE_PROJECT_ID: ${GEE_PROJECT_ID:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/run/secrets/gee_sa.json}
    volumes:
      # Ключ сервисного аккаунта EE (файл в ./secrets/, не в git). См. README «Google Earth Engine».
      - ./secrets/google-earth-engine-sa.json:/run/secrets/gee_sa.json:ro
    expose:
      - "3001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - webnet

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GEORISK_UMAMI_SCRIPT_URL: ${GEORISK_UMAMI_SCRIPT_URL:-https://cloud.umami.is/script.js}
        GEORISK_UMAMI_WEBSITE_ID: ${GEORISK_UMAMI_WEBSITE_ID:-}
        GEORISK_PUBLIC_SITE_URL: ${GEORISK_PUBLIC_SITE_URL:-https://${DOMAIN:-localhost}}
    env_file:
      - .env
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - webnet

  certbot:
    image: certbot/certbot:v2.11.0
    profiles:
      - certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    networks:
      - webnet

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - webnet

volumes:
  nginx_logs:
  pg_data:
  pgadmin_data:
  certbot_www:
  certbot_conf:

networks:
  webnet:
