# Опциональная замена default.conf после настройки HTTPS:
# только ACME + редирект с :80 на https://geo-risk.ru (см. README).
# Upstream нужны, потому что https.conf ссылается на те же имена.

upstream next_app {
    server web:3000;
    keepalive 32;
}

upstream api_app {
    server api:3001;
    keepalive 32;
}

server {
    listen 80 default_server;
    server_name geo-risk.ru www.geo-risk.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://geo-risk.ru$request_uri;
    }
}
